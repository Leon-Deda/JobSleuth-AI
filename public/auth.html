<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobSleuth AI - Sign In</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #090d18;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Navbar ─────────────────────────────────────────────────────────── */
      .navbar {
        display: flex;
        align-items: center;
        padding: 0 32px;
        height: 58px;
        background: #0b0f1c;
        border-bottom: 1px solid #14203a;
        flex-shrink: 0;
        z-index: 10;
      }
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 17px;
        font-weight: 700;
        color: #e2e8f0;
        text-decoration: none;
      }
      .nav-brand-logo {
        height: 56px;
        width: auto;
        display: block;
      }

      /* ── Layout ─────────────────────────────────────────────────────────── */
      .auth-wrapper {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Left decorative panel ──────────────────────────────────────────── */
      .panel-left {
        width: 42%;
        background: linear-gradient(150deg, #0c1a38 0%, #102d58 45%, #0e2449 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 52px;
        border-radius: 0 90px 90px 0;
        position: relative;
        z-index: 2;
        box-shadow: 14px 0 60px rgba(0, 0, 0, 0.65);
        flex-shrink: 0;
        overflow: hidden;
      }
      /* Ambient glow circles */
      .panel-left::before {
        content: '';
        position: absolute;
        top: -100px;
        right: -100px;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
        pointer-events: none;
      }
      .panel-left::after {
        content: '';
        position: absolute;
        bottom: -80px;
        left: -60px;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(29,78,216,0.1) 0%, transparent 70%);
        pointer-events: none;
      }

      .panel-brand {
        position: absolute;
        top: 28px;
        left: 36px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 700;
        color: #cbd5e0;
        z-index: 1;
      }
      .panel-brand-logo {
        height: 25px;
        width: auto;
        display: block;
      }

      .panel-cta {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        position: relative;
        z-index: 1;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .panel-cta.hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
        position: absolute;
      }
      .panel-cta h2 {
        font-size: 27px;
        font-weight: 700;
        color: #f1f5f9;
        line-height: 1.2;
      }
      .panel-cta p {
        font-size: 14px;
        color: #7c93b3;
        line-height: 1.7;
        max-width: 230px;
      }

      .btn-outline {
        margin-top: 6px;
        padding: 11px 42px;
        background: transparent;
        color: #c9d8ec;
        border: 1.5px solid rgba(180, 200, 230, 0.45);
        border-radius: 50px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2.2px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-outline:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(200, 220, 255, 0.7);
        color: #e2e8f0;
      }

      /* ── Right form panel ───────────────────────────────────────────────── */
      .panel-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 40px;
        position: relative;
      }

      .form-container {
        width: 100%;
        max-width: 350px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .form-container.hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(10px);
        position: absolute;
      }

      .form-title {
        font-size: 30px;
        font-weight: 700;
        color: #f1f5f9;
        text-align: center;
        letter-spacing: -0.3px;
      }

      .form-fields {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Input with icon */
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 17px;
        color: #3a4f6a;
        pointer-events: none;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }
      .input-wrap:focus-within .input-icon { color: #3b82f6; }

      .form-input {
        width: 100%;
        padding: 14px 16px 14px 46px;
        background: #0f1825;
        border: 1px solid #1a2840;
        border-radius: 50px;
        color: #e2e8f0;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-input::placeholder { color: #2e4060; }
      .form-input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.13);
      }
      .form-input.password-input {
        padding-right: 72px;
      }

      .password-toggle {
        position: absolute;
        right: 12px;
        border: 0;
        background: transparent;
        color: #6b85a8;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
        transition: color 0.2s, background-color 0.2s;
      }
      .password-toggle:hover {
        color: #93c5fd;
        background: rgba(59, 130, 246, 0.1);
      }

      /* Primary button */
      .btn-primary {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        border: none;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1.8px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 22px rgba(37, 99, 235, 0.38);
        margin-top: 6px;
      }
      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
        box-shadow: 0 6px 28px rgba(37, 99, 235, 0.55);
        transform: translateY(-1px);
      }
      .btn-primary:active:not(:disabled) { transform: translateY(0); }
      .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Error box */
      .form-error {
        background: rgba(239, 68, 68, 0.09);
        border: 1px solid rgba(239, 68, 68, 0.28);
        color: #fca5a5;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 13px;
        text-align: center;
      }
      .form-error.hidden { display: none; }

      /* Footer link */
      .form-footer {
        text-align: center;
        font-size: 13px;
        color: #3a4f6a;
      }
      .form-footer a {
        color: #60a5fa;
        text-decoration: none;
        cursor: pointer;
        transition: color 0.2s;
      }
      .form-footer a:hover { color: #93c5fd; text-decoration: underline; }

      /* ── Responsive ─────────────────────────────────────────────────────── */
      @media (max-width: 680px) {
        .panel-left { display: none; }
        .panel-right { padding: 32px 24px; }
        body { overflow: auto; }
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">

      <!-- ── Left panel ───────────────────────────────────────────────────── -->
      <div class="panel-left">
        <div class="panel-brand">
          <img class="panel-brand-logo" src="/logo3long.svg" alt="JobSleuth AI" />
        </div>

        <!-- Shown when sign-in is active -->
        <div class="panel-cta" id="cta-new">
          <h2>New here?</h2>
          <p>Sign up and start tracking your job applications with AI‑powered insights.</p>
          <button class="btn-outline" onclick="showMode('signup')">SIGN UP</button>
        </div>

        <!-- Shown when sign-up is active -->
        <div class="panel-cta hidden" id="cta-existing">
          <h2>Welcome back!</h2>
          <p>Already have an account? Sign in to continue your career journey.</p>
          <button class="btn-outline" onclick="showMode('signin')">SIGN IN</button>
        </div>
      </div>

      <!-- ── Right panel ──────────────────────────────────────────────────── -->
      <div class="panel-right">

        <!-- Sign In form -->
        <div class="form-container" id="form-signin">
          <h2 class="form-title">Sign In</h2>
          <div class="form-error hidden" id="signin-error"></div>
          <div class="form-fields">
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input class="form-input" id="signin-identifier" type="text"
                placeholder="Email or Username" autocomplete="username" />
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input class="form-input password-input" id="signin-password" type="password"
                placeholder="Password" autocomplete="current-password" />
              <button class="password-toggle" type="button" data-target="signin-password">SHOW</button>
            </div>
          </div>
          <button class="btn-primary" id="signin-btn" onclick="handleSignin()">LOGIN</button>
          <p class="form-footer"><a href="#" onclick="return false;">Forgot Password?</a></p>
        </div>

        <!-- Sign Up form -->
        <div class="form-container hidden" id="form-signup">
          <h2 class="form-title">Create Account</h2>
          <div class="form-error hidden" id="signup-error"></div>
          <div class="form-fields">
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <input class="form-input" id="signup-username" type="text"
                placeholder="Username" autocomplete="username" />
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
              </span>
              <input class="form-input" id="signup-email" type="email"
                placeholder="Email" autocomplete="email" />
            </div>
            <div class="input-wrap">
              <span class="input-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input class="form-input password-input" id="signup-password" type="password"
                placeholder="Password (min. 8 characters)" autocomplete="new-password" />
              <button class="password-toggle" type="button" data-target="signup-password">SHOW</button>
            </div>
          </div>
          <button class="btn-primary" id="signup-btn" onclick="handleSignup()">CREATE ACCOUNT</button>
          <p class="form-footer">Already have an account? <a onclick="showMode('signin')">Sign In</a></p>
        </div>

      </div>
    </div>

    <script>
      // Clear legacy persistent auth so login is required after reopening the site.
      localStorage.removeItem('jobtracker_token');
      localStorage.removeItem('jobtracker_user');

      // Redirect immediately only for the current browser tab/session.
      if (sessionStorage.getItem('jobtracker_token')) {
        window.location.replace('/');
      }

      function showMode(mode) {
        const ctaNew      = document.getElementById('cta-new');
        const ctaExisting = document.getElementById('cta-existing');
        const formSignin  = document.getElementById('form-signin');
        const formSignup  = document.getElementById('form-signup');

        if (mode === 'signup') {
          ctaNew.classList.add('hidden');
          ctaExisting.classList.remove('hidden');
          formSignin.classList.add('hidden');
          formSignup.classList.remove('hidden');
        } else {
          ctaExisting.classList.add('hidden');
          ctaNew.classList.remove('hidden');
          formSignup.classList.add('hidden');
          formSignin.classList.remove('hidden');
        }
      }

      function showError(formId, message) {
        const el = document.getElementById(formId + '-error');
        el.textContent = message;
        el.classList.remove('hidden');
      }
      function clearError(formId) {
        document.getElementById(formId + '-error').classList.add('hidden');
      }

      function setupPasswordToggles() {
        const toggles = document.querySelectorAll('.password-toggle');
        toggles.forEach((toggle) => {
          toggle.addEventListener('click', () => {
            const targetId = toggle.getAttribute('data-target');
            const input = document.getElementById(targetId);
            if (!input) return;
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            toggle.textContent = isHidden ? 'HIDE' : 'SHOW';
            toggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
          });
        });
      }

      setupPasswordToggles();

      async function handleSignin() {
        const identifier = document.getElementById('signin-identifier').value.trim();
        const password   = document.getElementById('signin-password').value;
        const btn        = document.getElementById('signin-btn');

        if (!identifier || !password) { showError('signin', 'Please fill in all fields.'); return; }

        clearError('signin');
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        try {
          const res  = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ identifier, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Login failed');

          sessionStorage.setItem('jobtracker_token', data.token);
          sessionStorage.setItem('jobtracker_user', JSON.stringify(data.user));
          window.location.replace('/');
        } catch (err) {
          showError('signin', err.message);
          btn.disabled = false;
          btn.textContent = 'LOGIN';
        }
      }

      async function handleSignup() {
        const username = document.getElementById('signup-username').value.trim();
        const email    = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const btn      = document.getElementById('signup-btn');

        if (!username || !email || !password) { showError('signup', 'Please fill in all fields.'); return; }

        clearError('signup');
        btn.disabled = true;
        btn.textContent = 'Creating account…';

        try {
          const res  = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Registration failed');

          sessionStorage.setItem('jobtracker_token', data.token);
          sessionStorage.setItem('jobtracker_user', JSON.stringify(data.user));
          window.location.replace('/');
        } catch (err) {
          showError('signup', err.message);
          btn.disabled = false;
          btn.textContent = 'CREATE ACCOUNT';
        }
      }

      // Enter key submits the visible form
      document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (!document.getElementById('form-signin').classList.contains('hidden')) handleSignin();
        else handleSignup();
      });
    </script>
  </body>
</html>
